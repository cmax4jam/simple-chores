name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Verify manifest version matches tag
        run: |
          manifest_version=$(python3 -c "import json; print(json.load(open('custom_components/simple_chores/manifest.json'))['version'])")
          tag_version="${{ steps.version.outputs.version }}"
          if [[ "$manifest_version" != "$tag_version" ]]; then
            echo "Error: manifest.json version ($manifest_version) does not match tag (v$tag_version)"
            exit 1
          fi

      - name: Package integration
        run: |
          cd custom_components/simple_chores
          zip -r ../../simple_chores.zip . -x '__pycache__/*' '*.pyc'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: simple_chores.zip